<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <title>BidiChat Settings</title>
  <style>
    body {
      font-family: Tahoma, sans-serif;
      background: #fff;
      padding: 20px;
      min-width: 280px;
    }
    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }
    select, input[type="text"], input[type="number"] {
      width: 100%;
      padding: 6px;
      margin-top: 4px;
      box-sizing: border-box;
    }
    button {
      margin-top: 16px;
      padding: 8px 16px;
      background: #0073e6;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #customFontGroup {
      display: none;
    }
  </style>
</head>
<body>
  <h2>⚙️ BidiChat Settings</h2>

  <label for="fontSelect">RTL Font:</label>
  <select id="fontSelect">
    <option value="Vazirmatn">Vazirmatn</option>
    <option value="IRANSans">IRANSans</option>
    <option value="Sahel">Sahel</option>
    <option value="Shabnam">Shabnam</option>
    <option value="Noto Naskh Arabic">Noto Naskh Arabic</option>
    <option value="Noto Sans Arabic">Noto Sans Arabic</option>
    <option value="Tahoma">Tahoma</option>
    <option value="Arial">Arial</option>
    <option value="custom">✏️ Custom font (enter manually)</option>
  </select>

  <div id="customFontGroup">
    <label for="customFont">Font name:</label>
    <input type="text" id="customFont" placeholder="e.g. MyFont" />
  </div>

  <label for="fontSize">Font size (pixels):</label>
  <input type="number" id="fontSize" min="10" max="40" value="16" />

  <button id="save">💾 Save Settings</button>
  <div id="status" style="margin-top:10px;color:green;"></div>

  <script src="options.js"></script>
</body>
</html>
